openapi: 3.1.0
info:
  title: Darsly Educational Platform API
  version: 1.0.0
  description: |
    REST API contract for the Darsly educational platform.
    Wallet functionality is removed. Payments are direct.
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: Students
  - name: Registration
  - name: Subjects
  - name: Groups
  - name: Sessions
  - name: Attendance
  - name: Homework
  - name: Exams
  - name: Grades
  - name: Payments
  - name: Materials
  - name: Notifications
  - name: Messages
  - name: WhatsApp
  - name: Search
  - name: Reports
  - name: Dashboard
security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      security: []
      summary: Register account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      tags: [Auth]
      security: []
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login challenge or authenticated session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/otp/verify:
    post:
      tags: [Auth]
      security: []
      summary: Verify OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /students:
    get:
      tags: [Students]
      summary: List students
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED, ARCHIVED]
      responses:
        '200':
          description: Student list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Students]
      summary: Create student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentRequest'
      responses:
        '201':
          description: Student created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /students/{studentId}:
    parameters:
      - $ref: '#/components/parameters/StudentId'
    get:
      tags: [Students]
      summary: Get student
      responses:
        '200':
          description: Student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Students]
      summary: Update student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentRequest'
      responses:
        '200':
          description: Updated student
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Students]
      summary: Archive student
      responses:
        '200':
          description: Student archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /student-registration-requests:
    get:
      tags: [Registration]
      summary: List registration requests
      responses:
        '200':
          description: Registration requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Registration]
      security: []
      summary: Submit student registration request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Request submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /student-registration-requests/{requestId}/approve:
    post:
      tags: [Registration]
      summary: Approve registration
      parameters:
        - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Registration approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /student-registration-requests/{requestId}/reject:
    post:
      tags: [Registration]
      summary: Reject registration
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Registration rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /subjects:
    get:
      tags: [Subjects]
      summary: List subjects
      responses:
        '200':
          description: Subject list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Subjects]
      summary: Create subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectRequest'
      responses:
        '201':
          description: Subject created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /subjects/{id}:
    get:
      tags: [Subjects]
      summary: Get subject
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Subject
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Subjects]
      summary: Update subject
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Subjects]
      summary: Archive subject
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /groups:
    get:
      tags: [Groups]
      summary: List groups
      responses:
        '200':
          description: Group list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Groups]
      summary: Create group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /groups/{id}:
    get:
      tags: [Groups]
      summary: Get group
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Groups]
      summary: Update group
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Groups]
      summary: Archive group
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /groups/{id}/students:
    post:
      tags: [Groups]
      summary: Enroll student
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId]
              properties:
                studentId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /groups/{id}/students/{studentId}:
    delete:
      tags: [Groups]
      summary: End student enrollment
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Enrollment ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /groups/{id}/students/{studentId}/transfer:
    post:
      tags: [Groups]
      summary: Transfer student to another group
      parameters:
        - $ref: '#/components/parameters/Id'
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetGroupId]
              properties:
                targetGroupId:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Transfer completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: groupId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Sessions]
      summary: Create session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '409':
          $ref: '#/components/responses/Conflict'

  /sessions/{id}:
    get:
      tags: [Sessions]
      summary: Get session
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Sessions]
      summary: Update session
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Sessions]
      summary: Cancel/archive session
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /sessions/{sessionId}/attendance:
    get:
      tags: [Attendance]
      summary: Get session attendance
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Attendance]
      summary: Record bulk attendance
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [records]
              properties:
                records:
                  type: array
                  items:
                    $ref: '#/components/schemas/AttendanceInput'
      responses:
        '200':
          description: Attendance saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /attendance/{attendanceId}:
    put:
      tags: [Attendance]
      summary: Update attendance
      parameters:
        - name: attendanceId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [PRESENT, ABSENT, LATE, EXCUSED]
                reason:
                  type: string
      responses:
        '200':
          description: Attendance updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /homeworks:
    get:
      tags: [Homework]
      summary: List homework
      responses:
        '200':
          description: Homework list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Homework]
      summary: Create homework
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkRequest'
      responses:
        '201':
          description: Homework created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /homeworks/{id}:
    get:
      tags: [Homework]
      summary: Get homework
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Homework
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    put:
      tags: [Homework]
      summary: Update homework
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeworkRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Homework]
      summary: Delete/archive homework
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /homeworks/{id}/submissions:
    get:
      tags: [Homework]
      summary: List homework submissions
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Submissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Homework]
      summary: Submit homework
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string }
                attachmentUrl: { type: string, format: uri }
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /exams:
    get:
      tags: [Exams]
      summary: List exams
      responses:
        '200':
          description: Exam list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Exams]
      summary: Create exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamRequest'
      responses:
        '201':
          description: Exam created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /exams/{id}:
    get:
      tags: [Exams]
      summary: Get exam
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Exam
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    put:
      tags: [Exams]
      summary: Update exam
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Exams]
      summary: Delete/archive exam
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /grades:
    get:
      tags: [Grades]
      summary: List grades
      parameters:
        - name: studentId
          in: query
          schema: { type: string, format: uuid }
        - name: subjectId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Grade list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Grades]
      summary: Create grade
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '201':
          description: Grade created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /grades/{id}:
    put:
      tags: [Grades]
      summary: Update grade
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Grades]
      summary: Delete grade
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Deleted

  /payments:
    get:
      tags: [Payments]
      summary: List payments
      parameters:
        - name: studentId
          in: query
          schema: { type: string, format: uuid }
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, SUCCESS, FAILED, CANCELLED, REFUNDED] }
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Payments]
      summary: Create direct payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '201':
          description: Payment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /payments/{id}:
    get:
      tags: [Payments]
      summary: Get payment
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /webhooks/payments/{provider}:
    post:
      tags: [Payments]
      security: []
      summary: Payment provider webhook
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
        - name: X-Provider-Signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook accepted
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /learning-materials:
    get:
      tags: [Materials]
      summary: List learning materials
      responses:
        '200':
          description: Material list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Materials]
      summary: Create learning material
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialRequest'
      responses:
        '201':
          description: Material created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /learning-materials/{id}:
    get:
      tags: [Materials]
      summary: Get material
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Material
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Materials]
      summary: Update material
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MaterialRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    delete:
      tags: [Materials]
      summary: Archive material
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /learning-materials/{id}/download:
    get:
      tags: [Materials]
      summary: Get authorized download URL
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Signed download URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /notifications:
    get:
      tags: [Notifications]
      summary: List own notifications
      responses:
        '200':
          description: Notifications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Mark notification read
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Notification marked read
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /conversations:
    get:
      tags: [Messages]
      summary: List conversations
      responses:
        '200':
          description: Conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /conversations/{studentId}/messages:
    get:
      tags: [Messages]
      summary: List conversation messages
      parameters:
        - $ref: '#/components/parameters/StudentId'
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [Messages]
      summary: Send message
      parameters:
        - $ref: '#/components/parameters/StudentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
      responses:
        '201':
          description: Message sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /whatsapp/messages:
    get:
      tags: [WhatsApp]
      summary: List WhatsApp messages
      responses:
        '200':
          description: Messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
    post:
      tags: [WhatsApp]
      summary: Send WhatsApp template message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WhatsAppMessageRequest'
      responses:
        '201':
          description: WhatsApp message created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /search:
    get:
      tags: [Search]
      summary: Search authorized resources
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string, minLength: 2 }
        - name: type
          in: query
          schema:
            type: string
            description: Comma-separated resource types
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /reports/{type}:
    get:
      tags: [Reports]
      summary: Generate report data
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
            enum: [financial, attendance, performance, student, group, subject]
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
        - name: studentId
          in: query
          schema: { type: string, format: uuid }
        - name: groupId
          in: query
          schema: { type: string, format: uuid }
        - name: subjectId
          in: query
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /dashboard/teacher:
    get:
      tags: [Dashboard]
      summary: Teacher dashboard
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /dashboard/student:
    get:
      tags: [Dashboard]
      summary: Student dashboard
      responses:
        '200':
          description: Dashboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    StudentId:
      name: studentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RequestId:
      name: requestId
      in: path
      required: true
      schema: { type: string, format: uuid }
    Page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: Authentication required or invalid
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  schemas:
    RegisterRequest:
      type: object
      required: [password, fullName, role]
      properties:
        phone: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        fullName: { type: string }
        role:
          type: string
          enum: [TEACHER, STUDENT]

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier: { type: string }
        password: { type: string }

    OtpVerifyRequest:
      type: object
      required: [challengeId, otp]
      properties:
        challengeId: { type: string, format: uuid }
        otp: { type: string, minLength: 4, maxLength: 8 }

    CreateStudentRequest:
      type: object
      required: [fullName, phone]
      properties:
        fullName: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        parentPhone: { type: string }
        educationLevel: { type: string }
        schoolName: { type: string }
        password: { type: string, minLength: 8 }

    UpdateStudentRequest:
      type: object
      properties:
        fullName: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        parentPhone: { type: string }
        educationLevel: { type: string }
        schoolName: { type: string }

    RegistrationRequest:
      type: object
      required: [teacherId, fullName, phone, password]
      properties:
        teacherId: { type: string, format: uuid }
        fullName: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    SubjectRequest:
      type: object
      required: [name, currency]
      properties:
        name: { type: string }
        description: { type: string }
        defaultPrice: { type: number, minimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }

    GroupRequest:
      type: object
      required: [subjectId, name]
      properties:
        subjectId: { type: string, format: uuid }
        name: { type: string }
        educationLevel: { type: string }
        price: { type: number, minimum: 0 }

    SessionRequest:
      type: object
      required: [title, startsAt, endsAt]
      properties:
        groupId: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        title: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        platform:
          type: string
          enum: [ZOOM, GOOGLE_MEET, OTHER]
        meetingUrl: { type: string, format: uri }
        notes: { type: string }

    AttendanceInput:
      type: object
      required: [studentId, status]
      properties:
        studentId: { type: string, format: uuid }
        status:
          type: string
          enum: [PRESENT, ABSENT, LATE, EXCUSED]

    HomeworkRequest:
      type: object
      required: [title]
      properties:
        groupId: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        title: { type: string }
        instructions: { type: string }
        dueAt: { type: string, format: date-time }

    ExamRequest:
      type: object
      required: [title, gradingMode]
      properties:
        subjectId: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        startsAt: { type: string, format: date-time }
        endsAt: { type: string, format: date-time }
        gradingMode:
          type: string
          enum: [MANUAL, AUTOMATIC, HYBRID]

    GradeRequest:
      type: object
      required: [studentId, score, maxScore, type]
      properties:
        studentId: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        subjectId: { type: string, format: uuid }
        examId: { type: string, format: uuid }
        homeworkId: { type: string, format: uuid }
        type: { type: string }
        score: { type: number, minimum: 0 }
        maxScore: { type: number, exclusiveMinimum: 0 }
        notes: { type: string }

    PaymentRequest:
      type: object
      required: [studentId, amount, currency, paymentMethod]
      properties:
        studentId: { type: string, format: uuid }
        subjectId: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        learningMaterialId: { type: string, format: uuid }
        amount: { type: number, exclusiveMinimum: 0 }
        currency: { type: string, minLength: 3, maxLength: 3 }
        paymentMethod:
          type: string
          enum: [CARD, FAWRY, MOBILE_WALLET, INSTA_PAY]
        description: { type: string }

    MaterialRequest:
      type: object
      required: [title, type, url, accessMode, pricingMode]
      properties:
        subjectId: { type: string, format: uuid }
        groupId: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        type: { type: string }
        url: { type: string, format: uri }
        accessMode:
          type: string
          enum: [VIEW_ONLY, DOWNLOADABLE]
        pricingMode:
          type: string
          enum: [FREE, PAID]
        price: { type: number, minimum: 0 }

    WhatsAppMessageRequest:
      type: object
      required: [recipientPhone, templateName, variables]
      properties:
        studentId: { type: string, format: uuid }
        recipientPhone: { type: string }
        templateName: { type: string }
        variables:
          type: object
          additionalProperties: true

    Student:
      type: object
      properties:
        id: { type: string, format: uuid }
        studentCode: { type: string }
        fullName: { type: string }
        phone: { type: string }
        email: { type: string, format: email, nullable: true }
        parentPhone: { type: string, nullable: true }
        educationLevel: { type: string, nullable: true }
        schoolName: { type: string, nullable: true }
        profileImageUrl: { type: string, nullable: true }
        status: { type: string }
        qrToken: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    StudentResponse:
      type: object
      properties:
        success: { type: boolean, const: true }
        data:
          $ref: '#/components/schemas/Student'

    StudentListResponse:
      type: object
      properties:
        success: { type: boolean, const: true }
        data:
          type: array
          items:
            $ref: '#/components/schemas/Student'
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    PaymentResponse:
      type: object
      properties:
        success: { type: boolean, const: true }
        data:
          type: object
          properties:
            paymentId: { type: string, format: uuid }
            amount: { type: number }
            currency: { type: string }
            status: { type: string }
            paymentMethod: { type: string }
            checkoutUrl: { type: string, format: uri, nullable: true }

    SuccessResponse:
      type: object
      properties:
        success: { type: boolean, const: true }
        data:
          nullable: true
        meta:
          nullable: true

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details:
              type: array
              items: {}

    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
